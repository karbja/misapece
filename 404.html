<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jejda, stránka nenalezena | Míša peče</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfbf7; 
            --text-color: #3e2723; 
            --accent-color: #d81b60; 
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0;
        }
        .container {
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 6rem;
            color: var(--accent-color);
            margin: 0;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }
        .btn {
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Jejda! Tento dortík už asi někdo snědl... 🧁</h2>
        <p>Stránka, kterou hledáte, neexistuje. Možná je v adrese překlep, nebo se recept ztratil někde v kuchyni.</p>
        <a href="/" class="btn">Vrátit se do sladké galerie</a>
    </div>
</body>
</html>
